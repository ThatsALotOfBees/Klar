<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Klar &mdash; Deep Space Comms</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Inline SVG icon symbols, referenced by app.js via <svg><use href="#klar-X"/></svg> -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="klar-asteroid" viewBox="0 0 32 32">
        <path d="M9 5 L18 3 L26 8 L29 16 L25 24 L17 28 L7 26 L3 18 L4 10 Z"
              fill="currentColor" stroke="currentColor" stroke-width="0.5" stroke-linejoin="round" />
        <circle cx="11" cy="12" r="2" fill="rgba(0,0,0,0.35)" />
        <circle cx="20" cy="18" r="1.4" fill="rgba(0,0,0,0.35)" />
        <circle cx="14" cy="22" r="1" fill="rgba(0,0,0,0.3)" />
        <circle cx="22" cy="10" r="0.8" fill="rgba(0,0,0,0.3)" />
      </symbol>
      <symbol id="klar-hash" viewBox="0 0 24 24">
        <path d="M5 9h14M5 15h14M10 4l-2 16M16 4l-2 16"
              fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
      </symbol>
      <symbol id="klar-lock" viewBox="0 0 24 24">
        <rect x="5" y="11" width="14" height="9" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
        <path d="M8 11V7a4 4 0 018 0v4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="klar-plus" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="klar-compass" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6" />
        <path d="M16 8l-2 6-6 2 2-6z" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
      </symbol>
      <symbol id="klar-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.8" />
        <path d="M20 20l-3.5-3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
      </symbol>
      <symbol id="klar-send" viewBox="0 0 24 24">
        <path d="M3 12l18-8-7 18-3-7-8-3z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="klar-menu" viewBox="0 0 24 24">
        <path d="M4 7h16M4 12h16M4 17h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
      </symbol>
      <symbol id="klar-mic" viewBox="0 0 24 24">
        <rect x="9" y="3" width="6" height="12" rx="3" fill="none" stroke="currentColor" stroke-width="1.6" />
        <path d="M5 12a7 7 0 0014 0M12 19v3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
      </symbol>
      <symbol id="klar-headphones" viewBox="0 0 24 24">
        <path d="M4 14v-2a8 8 0 0116 0v2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        <rect x="3" y="13" width="4" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.6" />
        <rect x="17" y="13" width="4" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.6" />
      </symbol>
      <symbol id="klar-settings" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.6" />
        <path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1.1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1.1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"
              fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="klar-logout" viewBox="0 0 24 24">
        <path d="M10 17l-5-5 5-5M5 12h12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M21 4v16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
      </symbol>
      <symbol id="klar-user" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="1.6" />
        <path d="M4 21c0-4 4-7 8-7s8 3 8 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
      </symbol>
      <symbol id="klar-phone" viewBox="0 0 24 24">
        <path d="M5 4c0-.5.4-1 1-1h2.5c.5 0 .9.3 1 .8l1 4c.1.4-.1.8-.4 1L8.5 10.2c1 2.2 2.7 3.9 4.8 4.9l1.4-1.6c.3-.3.7-.4 1.1-.3l4 1c.5.1.8.5.8 1V18c0 1.7-1.3 3-3 3-9 0-12-7-12-12V4z"
              fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
      </symbol>
      <symbol id="klar-phone-off" viewBox="0 0 24 24">
        <path d="M5 4c0-.5.4-1 1-1h2.5c.5 0 .9.3 1 .8l1 4c.1.4-.1.8-.4 1L8.5 10.2c1 2.2 2.7 3.9 4.8 4.9l1.4-1.6c.3-.3.7-.4 1.1-.3l4 1c.5.1.8.5.8 1V18c0 1.7-1.3 3-3 3-9 0-12-7-12-12V4z"
              fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
        <path d="M3 3l18 18" fill="none" stroke="#e85d75" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="klar-mic-off" viewBox="0 0 24 24">
        <rect x="9" y="3" width="6" height="12" rx="3" fill="none" stroke="currentColor" stroke-width="1.6" />
        <path d="M5 12a7 7 0 0014 0M12 19v3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        <path d="M3 3l18 18" fill="none" stroke="#e85d75" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="klar-video" viewBox="0 0 24 24">
        <rect x="3" y="6" width="13" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.6" />
        <path d="M16 10l5-3v10l-5-3z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
      </symbol>
      <symbol id="klar-screen" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="1.6" />
        <path d="M8 21h8M12 17v4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        <path d="M9 10l3-3 3 3M12 7v6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="klar-check" viewBox="0 0 24 24">
        <path d="M5 12l4 4 10-10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="klar-x" viewBox="0 0 24 24">
        <path d="M6 6l12 12M18 6l-12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="klar-palette" viewBox="0 0 24 24">
        <path d="M12 3a9 9 0 100 18c1.5 0 2.5-1 2.5-2.3 0-.6-.2-1.1-.6-1.6-.4-.5-.6-1-.6-1.6 0-1.3 1-2.3 2.3-2.3H17a4 4 0 004-4c0-3.3-4-6.2-9-6.2z"
              fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
        <circle cx="7.5" cy="11" r="1" fill="currentColor" />
        <circle cx="11.5" cy="7.5" r="1" fill="currentColor" />
        <circle cx="16.5" cy="9.5" r="1" fill="currentColor" />
      </symbol>
      <symbol id="klar-wrench" viewBox="0 0 24 24">
        <path d="M14.5 5.5a4.5 4.5 0 015.5 5.5l-2.6-2.6-2.4 2.4 2.6 2.6a4.5 4.5 0 01-5.5-5.5l-7 7a2.1 2.1 0 003 3l7-7z"
              fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" />
      </symbol>
      <symbol id="klar-users" viewBox="0 0 24 24">
        <circle cx="9" cy="9" r="3.2" fill="none" stroke="currentColor" stroke-width="1.6" />
        <path d="M2.5 19c0-3 3-5 6.5-5s6.5 2 6.5 5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        <circle cx="17" cy="7.5" r="2.6" fill="none" stroke="currentColor" stroke-width="1.5" />
        <path d="M15.5 14c2.5 0.2 5 1.7 5 4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      </symbol>

      <!-- Broken cable / unplugged-network glyph for the "server unreachable" screen -->
      <symbol id="klar-broken-cable" viewBox="0 0 120 64">
        <!-- Left cable end (RJ-45 plug shape) -->
        <rect x="3" y="22" width="38" height="20" rx="3" fill="rgba(157,109,255,0.15)" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
        <line x1="10" y1="22" x2="10" y2="42" stroke="currentColor" stroke-width="1" opacity="0.5" />
        <line x1="16" y1="22" x2="16" y2="42" stroke="currentColor" stroke-width="1" opacity="0.5" />
        <line x1="22" y1="22" x2="22" y2="42" stroke="currentColor" stroke-width="1" opacity="0.5" />
        <!-- Left strands sticking out -->
        <path d="M41 26 L48 23 M41 30 L48 30 M41 34 L48 36 M41 38 L48 40" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none" />

        <!-- Spark/break in the middle -->
        <path d="M52 18 L56 28 L48 32 L60 38" stroke="#e85d75" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="56" cy="14" r="1.5" fill="#e85d75" />
        <circle cx="64" cy="44" r="1.2" fill="#e85d75" />
        <circle cx="60" cy="22" r="0.8" fill="#e85d75" />

        <!-- Right strands sticking out -->
        <path d="M79 26 L72 23 M79 30 L72 30 M79 34 L72 36 M79 38 L72 40" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none" />
        <!-- Right cable end -->
        <rect x="79" y="22" width="38" height="20" rx="3" fill="rgba(157,109,255,0.15)" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
        <line x1="98"  y1="22" x2="98"  y2="42" stroke="currentColor" stroke-width="1" opacity="0.5" />
        <line x1="104" y1="22" x2="104" y2="42" stroke="currentColor" stroke-width="1" opacity="0.5" />
        <line x1="110" y1="22" x2="110" y2="42" stroke="currentColor" stroke-width="1" opacity="0.5" />
      </symbol>
    </defs>
  </svg>

  <!-- Desktop-app title bar. Hidden by default; app.js shows it only when
       the Electron preload bridge (window.klar.shell) is present. -->
  <div class="titlebar hidden" data-titlebar>
    <!-- Mirror layout: spacer on the left to keep the title centred, then
         the traffic-light cluster on the right. Button order is the
         Windows convention (minimize, maximize, close) reading L→R. -->
    <div class="titlebar-spacer"></div>
    <div class="titlebar-text" data-titlebar-text>Klar</div>
    <div class="traffic-lights">
      <button class="tl tl-minimize"   data-tl="minimize"   title="Minimize" tabindex="-1">
        <svg viewBox="0 0 12 12" aria-hidden="true"><path d="M3 6h6" stroke="rgba(0,0,0,0.65)" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
      <button class="tl tl-fullscreen" data-tl="fullscreen" title="Toggle fullscreen" tabindex="-1">
        <svg viewBox="0 0 12 12" aria-hidden="true"><path d="M4 1H1v3M8 1h3v3M4 11H1V8M8 11h3V8" fill="none" stroke="rgba(0,0,0,0.65)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="tl tl-close"      data-tl="close"      title="Close" tabindex="-1">
        <svg viewBox="0 0 12 12" aria-hidden="true"><path d="M3 3l6 6M9 3l-6 6" stroke="rgba(0,0,0,0.65)" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div id="app"></div>

  <!-- ============================== Auth ============================== -->

  <template id="tpl-auth">
    <div class="auth-shell">
      <div class="starfield"></div>
      <div class="nebula-glow nebula-a"></div>
      <div class="nebula-glow nebula-b"></div>

      <div class="auth-card">
        <h1 class="brand">
          <svg class="brand-glyph" aria-hidden="true"><use href="#klar-asteroid"/></svg>Klar
        </h1>
        <p class="brand-tag">Open frequencies. Private DMs. Cosmic comms.</p>

        <div class="tabs">
          <button class="tab active" data-tab="login">Log in</button>
          <button class="tab" data-tab="register">Sign up</button>
        </div>

        <form class="auth-form" data-form="login" autocomplete="off">
          <label>Username<input name="klar_id" type="text" autocomplete="off" data-lpignore="true" data-1p-ignore data-bwignore spellcheck="false" autocapitalize="off" autocorrect="off" required /></label>
          <label>Password<input name="klar_secret" type="password" autocomplete="off" data-lpignore="true" data-1p-ignore data-bwignore spellcheck="false" required /></label>
          <label class="remember-row">
            <input type="checkbox" name="remember" data-remember />
            <span>Stay logged in on this browser</span>
          </label>
          <button type="submit">Log in</button>
        </form>

        <form class="auth-form hidden" data-form="register" autocomplete="off">
          <label>Username<input name="klar_id" type="text" autocomplete="off" data-lpignore="true" data-1p-ignore data-bwignore spellcheck="false" autocapitalize="off" autocorrect="off" required pattern="[A-Za-z0-9_.\-]{3,24}" title="3-24 chars, letters/digits/._-" /></label>
          <label>Display name<input name="klar_display" type="text" autocomplete="off" data-lpignore="true" data-1p-ignore data-bwignore spellcheck="false" /></label>
          <label>Password<input name="klar_secret" type="password" autocomplete="off" data-lpignore="true" data-1p-ignore data-bwignore spellcheck="false" required minlength="8" /></label>
          <label class="remember-row">
            <input type="checkbox" name="remember" data-remember />
            <span>Stay logged in on this browser</span>
          </label>
          <button type="submit">Create account</button>
        </form>

        <div class="error" data-error hidden></div>
      </div>
    </div>
  </template>

  <!-- ============================== App shell ============================== -->

  <template id="tpl-app">
    <div class="app-shell" data-app-shell>
      <div class="starfield" style="z-index:0"></div>
      <div class="nebula-glow nebula-a"></div>
      <div class="nebula-glow nebula-b"></div>

      <!-- Server rail (left edge) -->
      <nav class="server-rail" data-rail>
        <div class="rail-slot active" data-action="select-home" data-label="Direct Messages">
          <span class="pill"></span>
          <span class="orbit-ring"></span>
          <button class="rail-btn home"><svg width="28" height="28"><use href="#klar-asteroid"/></svg></button>
        </div>
        <div class="rail-divider"></div>
        <div class="rail-server-list" data-server-list></div>
        <div class="rail-slot" data-label="Add a server">
          <button class="rail-btn action" data-action="create-server"><svg width="22" height="22"><use href="#klar-plus"/></svg></button>
        </div>
        <div class="rail-slot" data-label="Join with invite code">
          <button class="rail-btn action explore" data-action="join-server"><svg width="22" height="22"><use href="#klar-compass"/></svg></button>
        </div>
      </nav>

      <!-- Sidebar (DMs or channels) -->
      <aside class="sidebar" data-sidebar></aside>

      <!-- Chat -->
      <main class="chat" data-chat>
        <div class="chat-empty" data-chat-empty>
          <h2>Welcome to Klar</h2>
          <p>Open the asteroid for direct messages, or pick a server orb on the left.</p>
        </div>
        <div class="chat-active hidden" data-chat-active>
          <header class="chat-header" data-chat-header></header>

          <!-- Discord-style call view: big stage with participant tiles
               (or screen-share videos when active) and a controls bar
               beneath. Visible only when there's an active call in this DM. -->
          <div class="call-view hidden" data-call-banner>
            <div class="call-stage" data-call-stage>
              <div class="participant-tiles" data-call-tiles>
                <div class="ptile" data-ptile-self>
                  <div class="ptile-avatar"><div class="avatar"></div><span class="mute-badge" data-self-mute hidden></span></div>
                  <div class="ptile-name">You</div>
                </div>
                <div class="ptile" data-ptile-peer>
                  <div class="ptile-avatar"><div class="avatar"></div><span class="mute-badge" data-peer-mute hidden></span></div>
                  <div class="ptile-name" data-call-peer-name>—</div>
                </div>
              </div>
              <!-- Screen share previews. Local one always visible while
                   sharing; remote one whenever we receive a video track. -->
              <div class="screen-tiles" data-screen-tiles hidden>
                <div class="screen-tile self hidden" data-local-screen-tile>
                  <video data-local-screen autoplay muted playsinline></video>
                  <div class="screen-tile-label">Your screen</div>
                </div>
                <div class="screen-tile peer hidden" data-remote-screen-tile>
                  <video data-remote-screen autoplay playsinline></video>
                  <div class="screen-tile-label" data-remote-screen-label>—</div>
                </div>
              </div>
            </div>
            <div class="call-controls-bar">
              <button class="cc-jump" data-call-banner-jump type="button" title="—">
                <span class="cc-state" data-call-state>—</span>
              </button>
              <div class="cc-spacer"></div>
              <button class="call-ctrl" data-call-ctrl="mute" title="Mute" aria-label="Mute mic">
                <svg width="18" height="18"><use href="#klar-mic"/></svg>
              </button>
              <button class="call-ctrl" data-call-ctrl="deafen" title="Deafen" aria-label="Deafen">
                <svg width="18" height="18"><use href="#klar-headphones"/></svg>
              </button>
              <button class="call-ctrl" data-call-ctrl="screen" title="Share screen" aria-label="Share screen">
                <svg width="18" height="18"><use href="#klar-screen"/></svg>
              </button>
              <button class="call-ctrl danger" data-call-ctrl="hangup" title="Leave call" aria-label="Leave call">
                <svg width="18" height="18"><use href="#klar-phone-off"/></svg>
              </button>
            </div>
          </div>

          <div class="messages" data-messages></div>
          <form class="composer" data-composer>
            <input type="text" placeholder="Transmit a message" data-composer-input autocomplete="off" />
            <button type="submit" title="Transmit"><svg width="16" height="16"><use href="#klar-send"/></svg></button>
          </form>
          <div class="composer-status" data-composer-status></div>
        </div>
      </main>

      <!-- Members (right edge, server view only) -->
      <aside class="members hidden" data-members></aside>
    </div>
  </template>

  <!-- ============================== Sidebars ============================== -->

  <template id="tpl-sidebar-home">
    <div class="sidebar-header">
      <div class="sidebar-title">Direct Messages</div>
    </div>
    <div class="search">
      <input type="search" placeholder="Find a pilot by username..." data-user-search />
      <div class="search-results" data-search-results hidden></div>
    </div>
    <ul class="dm-list" data-dm-list></ul>
    <div class="me-bar" data-me-bar></div>
  </template>

  <template id="tpl-sidebar-server">
    <div class="sidebar-header">
      <div>
        <div class="sidebar-title" data-server-name></div>
        <div class="sidebar-meta" data-server-tag>OPEN FREQUENCY</div>
      </div>
      <button class="icon-btn" data-action="server-menu" title="Server menu">
        <svg width="16" height="16"><use href="#klar-menu"/></svg>
      </button>
    </div>
    <ul class="channel-list" data-channel-list></ul>
    <div class="me-bar" data-me-bar></div>
  </template>

  <!-- ============================== Modals ============================== -->

  <template id="tpl-modal-create-server">
    <div class="modal-backdrop" data-modal>
      <div class="modal">
        <h2>Establish a server</h2>
        <p>A space for your crew. You can rename or decommission it later.</p>
        <form data-form="create-server">
          <label>Server name<input name="name" required maxlength="60" autofocus /></label>
          <div class="modal-actions">
            <button type="button" class="ghost" data-action="cancel">Cancel</button>
            <button type="submit">Create</button>
          </div>
        </form>
        <div class="error" data-error hidden></div>
      </div>
    </div>
  </template>

  <template id="tpl-modal-join-server">
    <div class="modal-backdrop" data-modal>
      <div class="modal">
        <h2>Join a server</h2>
        <p>Paste an invite code from someone whose orbit you want to share.</p>
        <form data-form="join-server">
          <label>Invite code<input name="code" required maxlength="32" autofocus pattern="[A-Za-z0-9]+" /></label>
          <div class="modal-actions">
            <button type="button" class="ghost" data-action="cancel">Cancel</button>
            <button type="submit">Join</button>
          </div>
        </form>
        <div class="error" data-error hidden></div>
      </div>
    </div>
  </template>

  <template id="tpl-modal-create-channel">
    <div class="modal-backdrop" data-modal>
      <div class="modal">
        <h2>New channel</h2>
        <p>Channel names are lowercase, no spaces.</p>
        <form data-form="create-channel">
          <label>Channel name<input name="name" required pattern="[a-z0-9][a-z0-9_\-]*" maxlength="32" autofocus placeholder="general" /></label>

          <div class="channel-kind-picker">
            <label class="kind-option">
              <input type="radio" name="kind" value="text" checked />
              <div class="kind-card">
                <div class="kind-icon"><svg width="20" height="20"><use href="#klar-hash"/></svg></div>
                <div>
                  <div class="kind-name">Text</div>
                  <div class="kind-desc">Open chat — anyone can post.</div>
                </div>
              </div>
            </label>
            <label class="kind-option">
              <input type="radio" name="kind" value="announcement" />
              <div class="kind-card">
                <div class="kind-icon"><svg width="20" height="20"><use href="#klar-mic"/></svg></div>
                <div>
                  <div class="kind-name">Announcement</div>
                  <div class="kind-desc">Only the server owner can post; everyone else can read.</div>
                </div>
              </div>
            </label>
            <label class="kind-option disabled" title="Voice channels coming in a future release">
              <input type="radio" name="kind" value="voice" disabled />
              <div class="kind-card">
                <div class="kind-icon"><svg width="20" height="20"><use href="#klar-headphones"/></svg></div>
                <div>
                  <div class="kind-name">Voice <span class="muted small">(coming soon)</span></div>
                  <div class="kind-desc">Persistent audio room — under construction.</div>
                </div>
              </div>
            </label>
          </div>

          <div class="modal-actions">
            <button type="button" class="ghost" data-action="cancel">Cancel</button>
            <button type="submit">Create</button>
          </div>
        </form>
        <div class="error" data-error hidden></div>
      </div>
    </div>
  </template>

  <template id="tpl-modal-invite">
    <div class="modal-backdrop" data-modal>
      <div class="modal">
        <h2>Beam an invite</h2>
        <p>Share this code so others can sync up with your server.</p>
        <div class="invite-code" data-invite-code>...</div>
        <div class="modal-actions">
          <button type="button" data-action="copy-invite">Copy</button>
          <button type="button" class="ghost" data-action="cancel">Done</button>
        </div>
        <div class="muted" data-invite-status style="margin-top:10px"></div>
      </div>
    </div>
  </template>

  <template id="tpl-modal-profile">
    <div class="modal-backdrop" data-modal>
      <div class="modal profile-modal">
        <div class="profile-banner"></div>
        <div class="profile-avatar"><div class="avatar"></div></div>
        <h2 class="profile-name" data-profile-name></h2>
        <div class="profile-handle muted" data-profile-handle></div>
        <div class="profile-fields">
          <div class="profile-field">
            <span class="label">User ID</span>
            <code class="value" data-profile-id></code>
          </div>
          <div class="profile-field">
            <span class="label">Joined</span>
            <span class="value" data-profile-joined>—</span>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="ghost" data-action="cancel">Close</button>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-modal-server-menu">
    <div class="modal-backdrop" data-modal>
      <div class="modal">
        <h2 data-server-name></h2>
        <div class="server-menu-actions">
          <button data-action="create-channel">+ New channel</button>
          <button data-action="invite">Beam an invite</button>
          <button class="danger" data-action="leave">Leave server</button>
          <button class="danger" data-action="delete" hidden>Decommission server</button>
        </div>
        <div class="modal-actions">
          <button type="button" class="ghost" data-action="cancel">Close</button>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-modal-settings">
    <div class="modal-backdrop settings-backdrop" data-modal>
      <div class="modal settings-modal">
        <button class="settings-close" data-action="cancel" title="Close" aria-label="Close">
          <svg width="14" height="14"><use href="#klar-x"/></svg>
        </button>
        <nav class="settings-nav" data-settings-nav>
          <button class="settings-nav-btn active" data-tab="voice">
            <svg width="16" height="16"><use href="#klar-mic"/></svg><span>Voice</span>
          </button>
          <button class="settings-nav-btn" data-tab="video">
            <svg width="16" height="16"><use href="#klar-video"/></svg><span>Video</span>
          </button>
          <button class="settings-nav-btn" data-tab="notifications">
            <svg width="16" height="16"><use href="#klar-headphones"/></svg><span>Notifications</span>
          </button>
          <button class="settings-nav-btn" data-tab="personalization">
            <svg width="16" height="16"><use href="#klar-palette"/></svg><span>Personalization</span>
          </button>
          <button class="settings-nav-btn" data-tab="advanced">
            <svg width="16" height="16"><use href="#klar-wrench"/></svg><span>Advanced</span>
          </button>
        </nav>
        <div class="settings-body">
          <section class="settings-pane active" data-pane="voice">
            <h2>Voice settings</h2>
            <div class="setting-row">
              <label>Input device (microphone)</label>
              <select data-voice-input></select>
            </div>
            <div class="setting-row">
              <label>Output device (speakers / headphones)</label>
              <select data-voice-output></select>
              <p class="muted small" data-output-note>Some browsers / Electron versions don't allow output device switching — falls back to system default.</p>
            </div>
            <div class="setting-row">
              <label>Input volume <span class="value" data-input-vol-value>100%</span></label>
              <input type="range" min="0" max="200" value="100" data-input-vol />
            </div>
            <div class="setting-row">
              <label>Output volume <span class="value" data-output-vol-value>100%</span></label>
              <input type="range" min="0" max="200" value="100" data-output-vol />
            </div>
            <div class="setting-row">
              <label>Noise gate <span class="value" data-noise-gate-value>off</span></label>
              <input type="range" min="0" max="100" value="0" data-noise-gate />
              <p class="muted small">Real-time noise gate. 0 disables it; higher values silence more background sound. Combined with the browser's built-in suppression.</p>
            </div>
            <div class="setting-row">
              <label class="check-row"><input type="checkbox" data-noise-suppression checked /><span>Built-in noise suppression (WebRTC)</span></label>
              <label class="check-row"><input type="checkbox" data-echo-cancellation checked /><span>Echo cancellation</span></label>
              <label class="check-row"><input type="checkbox" data-auto-gain checked /><span>Auto gain control</span></label>
            </div>
            <div class="setting-row">
              <label>Mic test</label>
              <div style="display:flex; gap:8px; flex-wrap:wrap; width:100%">
                <button class="ghost" data-mic-test-btn>Start test</button>
                <label class="check-row" style="margin:0"><input type="checkbox" data-mic-loopback checked /><span>Hear myself</span></label>
              </div>
              <div class="mic-meter" data-mic-meter><span></span></div>
            </div>

            <div class="setting-row">
              <label>Hotkeys</label>
              <div class="hotkey-list" data-hotkey-list></div>
              <p class="muted small">Click a row to bind a new combo, then press the keys (Esc to clear). Hotkeys work app-wide while Klar has focus.</p>
            </div>
          </section>

          <section class="settings-pane" data-pane="video">
            <h2>Video settings</h2>
            <div class="setting-row">
              <label>Camera</label>
              <select data-video-input></select>
            </div>
            <div class="setting-row">
              <label>Resolution</label>
              <select data-video-resolution>
                <option value="480">SD (640×480)</option>
                <option value="720" selected>HD (1280×720)</option>
                <option value="1080">FHD (1920×1080)</option>
              </select>
            </div>
            <div class="setting-row">
              <label>Preview</label>
              <video class="video-preview" data-video-preview autoplay muted playsinline></video>
              <div class="video-preview-actions">
                <button class="ghost" data-video-test-btn>Start preview</button>
                <button class="ghost" data-video-stop-btn hidden>Stop preview</button>
              </div>
              <p class="muted small">Video calling itself is not implemented yet — these controls just configure your camera so it's ready when it ships.</p>
            </div>
          </section>

          <section class="settings-pane" data-pane="notifications">
            <h2>Notifications</h2>
            <div class="setting-row">
              <label class="check-row"><input type="checkbox" data-notif-enabled checked /><span>Show in-app toasts for incoming DMs</span></label>
              <label class="check-row"><input type="checkbox" data-notif-sound   checked /><span>Play notification sound</span></label>
              <label class="check-row"><input type="checkbox" data-notif-focused /><span>Also notify when the window is already focused</span></label>
            </div>
            <div class="setting-row">
              <label>Notification volume <span class="value" data-notif-volume-value>80%</span></label>
              <input type="range" min="0" max="100" value="80" data-notif-volume />
              <button class="ghost" data-notif-test>Test sound</button>
            </div>
            <div class="setting-row">
              <label class="check-row"><input type="checkbox" data-tray-enabled checked /><span>Keep Klar running in the tray when the window is closed</span></label>
              <p class="muted small">Klar keeps receiving messages and call invites in the background. Right-click the tray icon to quit.</p>
            </div>
            <div class="setting-row">
              <label>Blocked users</label>
              <div class="blocked-list" data-blocked-list>
                <div class="muted small">Loading…</div>
              </div>
              <p class="muted small">Right-click any DM in the sidebar to block someone. Blocked users can't message or call you and disappear from your DM list.</p>
            </div>
          </section>

          <section class="settings-pane" data-pane="personalization">
            <h2>Personalization</h2>
            <div class="setting-row">
              <label>Display name</label>
              <input type="text" maxlength="60" data-display-name />
              <button data-save-display-name>Save</button>
              <span class="muted small" data-display-name-status></span>
            </div>
            <div class="setting-row">
              <label>Username (immutable)</label>
              <input type="text" data-username readonly />
            </div>
            <div class="setting-row">
              <label>Accent color</label>
              <div class="accent-grid" data-accent-grid></div>
              <p class="muted small">Tints highlights, links, and your message rail. Saved locally per-machine.</p>
            </div>
            <div class="setting-row">
              <label>Font size <span class="value" data-font-value>15px</span></label>
              <input type="range" min="12" max="20" value="15" data-font-size />
            </div>
            <div class="setting-row">
              <label class="check-row"><input type="checkbox" data-compact-mode /><span>Compact message mode</span></label>
              <label class="check-row"><input type="checkbox" data-reduce-motion /><span>Reduce motion (overrides OS preference)</span></label>
            </div>
          </section>

          <section class="settings-pane" data-pane="advanced">
            <h2>Advanced</h2>
            <div class="setting-row">
              <label>Server URL (currently used)</label>
              <code class="code-block" data-current-server-url>—</code>
            </div>
            <div class="setting-row">
              <label>Override server URL (per-machine)</label>
              <input type="text" placeholder="https://your.server.example" data-server-override />
              <button data-save-override>Save</button>
              <button class="ghost" data-clear-override>Clear</button>
              <p class="muted small">Bypasses the GitHub-hosted discovery file. Use only if your friend's host moved off the published URL.</p>
            </div>
            <div class="setting-row">
              <label>Client version</label>
              <code class="code-block" data-client-version>0.0.0</code>
              <button class="ghost" data-check-updates>Check for updates now</button>
              <span class="muted small" data-update-status></span>
            </div>
            <div class="setting-row">
              <label>Log directory (Electron only)</label>
              <code class="code-block" data-log-dir>n/a</code>
              <button class="ghost" data-open-log-dir hidden>Open in Explorer</button>
            </div>
            <div class="setting-row">
              <label class="check-row"><input type="checkbox" data-debug-mode /><span>Debug mode (verbose console logging)</span></label>
            </div>
            <div class="setting-row danger-row">
              <label>Factory reset</label>
              <button class="danger" data-factory-reset>Wipe local settings + log out</button>
              <p class="muted small">Clears localStorage on this machine and signs you out. Server-side data is untouched.</p>
            </div>
          </section>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-modal-incoming-call">
    <div class="modal-backdrop call-backdrop" data-modal>
      <div class="modal call-modal incoming">
        <div class="call-avatar"><div class="avatar"></div></div>
        <h2>Incoming call</h2>
        <p class="muted" data-caller-handle>—</p>
        <div class="call-pulse-rings"><span></span><span></span><span></span></div>
        <div class="modal-actions call-actions">
          <button class="call-decline" data-action="decline" title="Decline">
            <svg width="22" height="22"><use href="#klar-phone-off"/></svg>
          </button>
          <button class="call-accept" data-action="accept" title="Accept">
            <svg width="22" height="22"><use href="#klar-phone"/></svg>
          </button>
        </div>
      </div>
    </div>
  </template>

  <script type="module" src="app.js"></script>
</body>
</html>
